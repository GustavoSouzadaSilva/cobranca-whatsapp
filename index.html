<script>

const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcDM7gyYFT_ZwH_Q1sIkUYbpdpm6-5LG5nydGdv74VcEKFaav7hbhEPzK28e-B6QVIeki6RSTAb6yF/pub?gid=1041235902&single=true&output=csv";

// 🔴 COLE AQUI SEU LINK DO APPS SCRIPT
const urlScript = "https://script.google.com/macros/s/AKfycbzhC-8PKaSEYW2ePh3iNVN9_kEFzvA6ahwUVE5ParUjn-XWbE0N1XFPo8TvcJBdzypO/exec";

fetch(urlCSV)
.then(response => response.text())
.then(data => {

let linhas = data.split("\n");
let tabela = document.querySelector("#tabela tbody");

// 👇 AGORA COM INDEX (IMPORTANTE)
linhas.slice(1).forEach((linha,index) => {

let partes = linha.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!partes) return;

let nome = partes[0];
let telefone = partes[1];
let valor = partes[2].replace(/"/g,"");
let enviar = partes[3];

// 👇 LINHA REAL NA PLANILHA
let numeroLinha = index + 2;

if(enviar && enviar.trim().toUpperCase()=="SIM"){

let mensagem = `Olá ${nome}, identificamos um valor em aberto de *R$ ${valor}*, se precisar de detalhamento, favor me solicite.
*Por favor, como podemos regularizar?* 

Segue a chave Pix para pagamento:
CNPJ: 04.244.373/0002-40 `;

let link = `https://wa.me/55${telefone}?text=${encodeURIComponent(mensagem)}`;

let tr = document.createElement("tr");

tr.innerHTML = `
<td>${nome}</td>
<td>${telefone}</td>
<td>${valor}</td>
<td>
<a href="${link}" target="_blank"
onclick="registrarCobranca(${numeroLinha})">
Enviar
</a>
</td>
`;

tabela.appendChild(tr);

}

});

});

// 🚀 FUNÇÃO QUE GRAVA NA PLANILHA
function registrarCobranca(linha){

fetch(urlScript + "?linha=" + linha)
.then(() => console.log("Registrado na planilha"))
.catch(() => console.log("Erro ao registrar"));

}

</script>
