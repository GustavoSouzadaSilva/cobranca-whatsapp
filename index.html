<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Painel de Cobrança WhatsApp</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
padding:40px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

button{
background:#25D366;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Painel de Cobrança</h1>

<table id="tabela">

<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Valor</th>
<th>Ação</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcDM7gyYFT_ZwH_Q1sIkUYbpdpm6-5LG5nydGdv74VcEKFaav7hbhEPzK28e-B6QVIeki6RSTAb6yF/pub?gid=1041235902&single=true&output=csv";

fetch(urlCSV)
.then(response => response.text())
.then(data => {

let linhas = data.split("\n");
let tabela = document.querySelector("#tabela tbody");

linhas.slice(1).forEach(linha => {

let partes = linha.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!partes) return;

let nome = partes[0];
let telefone = partes[1];
let valor = partes[2].replace(/"/g,"");
let enviar = partes[3];

if(enviar && enviar.trim().toUpperCase()=="SIM"){

let mensagem = `Olá ${nome}, identificamos um valor em aberto de *R$ ${valor}*, se precisar de detalhamento, favor me solicite.
*Por favor, como podemos regularizar?* 

Segue a chave Pix para pagamento:
CNPJ: 04.244.373/0002-40 `;

let link = `https://wa.me/55${telefone}?text=${encodeURIComponent(mensagem)}`;

let tr = document.createElement("tr");

tr.innerHTML = `
<td>${nome}</td>
<td>${telefone}</td>
<td>${valor}</td>
<td><button onclick="window.open('${link}')">Enviar</button></td>
`;

tabela.appendChild(tr);

}

});

});

</script>

</body>
</html>
