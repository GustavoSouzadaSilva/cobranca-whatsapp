<script>

var urlPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcDM7gyYFT_ZwH_Q1sIkUYbpdpm6-5LG5nydGdv74VcEKFaav7hbhEPzK28e-B6QVIeki6RSTAb6yF/pub?gid=1041235902&single=true&output=csv;"

fetch(urlPlanilha)
.then(res => res.text())
.then(data => {

var linhas = data.split("\n");
linhas.shift();

linhas.forEach(linha=>{

var colunas = linha.split(",");

var nome = colunas[0];
var telefone = colunas[1];
var valor = colunas[2];

if(nome){

var mensagem = `Olá ${nome}, identificamos um valor em aberto de R$ ${valor}. Poderia verificar?`;

var link = "https://wa.me/55"+telefone+"?text="+encodeURIComponent(mensagem);

var div = document.createElement("div");
div.className="card";

div.innerHTML = `
<b>${nome}</b><br>
Valor: R$ ${valor}<br><br>
<button onclick="window.open('${link}','_blank')">Enviar WhatsApp</button>
`;

document.getElementById("lista").appendChild(div);

}

})

})

</script>
